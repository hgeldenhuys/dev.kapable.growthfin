# SignalDB Apps Platform - Dynamic Routing
# Routes *.apps.signaldb.live to user-deployed containers
#
# URL Pattern: {org}--{app}--{env}.apps.signaldb.live
# Example: acme--crm--dev.apps.signaldb.live
#
# For production: {org}--{app}.apps.signaldb.live
# Example: acme--crm.apps.signaldb.live (implies production)

# Map to extract subdomain parts
map $host $app_subdomain {
    ~^(?<sub>[^.]+)\.apps\.signaldb\.live$ $sub;
    default "";
}

# User-deployed apps subdomain
server {
    listen 80;
    listen [::]:80;
    server_name *.apps.signaldb.live;

    # Pass subdomain info to upstream
    set $upstream_port "";

    # Health check endpoint for containers
    location = /health {
        proxy_pass http://127.0.0.1:3003/apps/proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Subdomain $app_subdomain;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # All requests go through the apps proxy handler
    # The API resolves subdomain -> port and proxies to the container
    location / {
        proxy_pass http://127.0.0.1:3003/apps/proxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-App-Subdomain $app_subdomain;

        # Standard timeout for app requests
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Allow large uploads for apps
        client_max_body_size 50m;
    }

    # SSE/streaming endpoints need longer timeouts
    location ~ ^.*/stream {
        proxy_pass http://127.0.0.1:3003/apps/proxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-App-Subdomain $app_subdomain;

        # SSE settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Long timeout for SSE
        proxy_connect_timeout 10s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # WebSocket support
    location ~ ^.*/ws {
        proxy_pass http://127.0.0.1:3003/apps/proxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-App-Subdomain $app_subdomain;

        # WebSocket timeout
        proxy_connect_timeout 10s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
}
