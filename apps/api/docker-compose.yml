version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: signaldb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signaldb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signaldb_secret_change_me}
      POSTGRES_DB: signaldb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signaldb -d signaldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signaldb-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
